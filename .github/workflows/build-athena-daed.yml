name: Build Athena AX6600 DAED

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "源码分支或提交；默认 main"
        required: true
        default: "main"
        type: string
      config_only:
        description: "只生成并检查 .config，不编译固件"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: athena-daed-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: RE-CS-02 / DAED Dashboard / BTF
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    env:
      SOURCE_REPO: https://github.com/ones20250/immortalwrt_ipq.git
      SOURCE_REF: ${{ inputs.source_ref }}
      LAN_IP: 192.168.50.1
      HOSTNAME: Athena-DAED

    steps:
      - name: Checkout builder
        uses: actions/checkout@v4

      - name: Normalize helper scripts
        run: |
          sed -i 's/\r$//' "$GITHUB_WORKSPACE"/scripts/*.sh
          chmod +x "$GITHUB_WORKSPACE"/scripts/*.sh

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc || true
          sudo docker image prune -af || true
          df -h

      - name: Initialize build environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get -qq update
          sudo apt-get -qq install -y \
            build-essential clang flex bison g++ gawk gcc-multilib \
            gettext git libncurses-dev libssl-dev python3-setuptools \
            python3-pyelftools rsync swig unzip zlib1g-dev file wget \
            curl jq qemu-utils ccache dos2unix
          sudo bash -c 'bash <(curl -fsSL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo timedatectl set-timezone Asia/Shanghai

      - name: Clone Athena source
        run: |
          git clone --depth=1 "$SOURCE_REPO" openwrt
          cd openwrt
          if [ "$SOURCE_REF" != "main" ]; then
            git fetch --depth=1 origin "$SOURCE_REF"
            git checkout --detach FETCH_HEAD
          fi
          echo "SOURCE_COMMIT=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          git log -1 --oneline

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Inject DAED dashboard packages
        run: |
          set -eux
          rm -rf /tmp/openwrt-daede /tmp/passwall-packages
          git clone --depth=1 https://github.com/kenzok8/openwrt-daede.git /tmp/openwrt-daede
          git clone --depth=1 https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git /tmp/passwall-packages

          cd openwrt
          mkdir -p package/custom

          # 清除同名包，避免 feed 冲突。
          rm -rf \
            package/custom/dae \
            package/custom/daed \
            package/custom/luci-app-daede \
            package/custom/v2ray-geodata \
            package/feeds/*/dae \
            package/feeds/*/daed \
            package/feeds/*/luci-app-daede \
            package/feeds/*/v2ray-geodata 2>/dev/null || true

          # 只构建 daed 完整可视化后端。
          cp -a /tmp/openwrt-daede/daed package/custom/
          cp -a /tmp/openwrt-daede/luci-app-daede package/custom/
          cp -a /tmp/passwall-packages/v2ray-geodata package/custom/

          test -f package/custom/daed/Makefile
          test -f package/custom/luci-app-daede/Makefile
          test -f package/custom/v2ray-geodata/Makefile

      - name: Apply optimized DAED configuration
        run: |
          cd openwrt
          cp "$GITHUB_WORKSPACE/config/athena-daed.config" .config

          CFG="./package/base-files/files/bin/config_generate"
          if [ -f "$CFG" ]; then
            sed -i -E "s/192\.168\.[0-9]+\.[0-9]+/$LAN_IP/g" "$CFG"
            sed -i -E "s/hostname='[^']*'/hostname='$HOSTNAME'/g" "$CFG"
          fi

          make defconfig
          cp .config "$GITHUB_WORKSPACE/config.final"

      - name: Verify DAED kernel and dashboard configuration
        run: |
          cd openwrt
          bash "$GITHUB_WORKSPACE/scripts/check-build-config.sh" .config

          echo "===== Selected source ====="
          echo "$SOURCE_REPO @ $SOURCE_COMMIT"
          echo "===== DAED/BTF selections ====="
          grep -E \
            'CONFIG_(KERNEL_DEBUG_INFO_BTF|KERNEL_XDP_SOCKETS|PACKAGE_daed|DAED_USE_KERNEL_BTF|PACKAGE_luci-app-daede|PACKAGE_luci-app-daede_daed|PACKAGE_kmod-sched-bpf|PACKAGE_kmod-veth)=' \
            .config

      - name: Cache compiler output
        if: ${{ !inputs.config_only }}
        uses: actions/cache@v4
        with:
          path: |
            openwrt/.ccache
            openwrt/staging_dir/host*
            openwrt/staging_dir/tool*
          key: athena-daed-${{ runner.os }}-${{ env.SOURCE_COMMIT }}-${{ hashFiles('config/athena-daed.config') }}
          restore-keys: |
            athena-daed-${{ runner.os }}-

      - name: Download sources
        if: ${{ !inputs.config_only }}
        run: |
          cd openwrt
          make download -j"$(nproc)"
          find dl -type f -size -1024c -delete

      - name: Compile firmware
        if: ${{ !inputs.config_only }}
        run: |
          cd openwrt
          make -j"$(nproc)" || make -j1 V=s

      - name: Collect output
        if: always()
        run: |
          set -eux
          mkdir -p output
          cp -f config.final output/athena-daed-final.config
          cp -f scripts/verify-after-flash.sh output/
          cp -f docs/刷机与DAED验收说明.md output/

          if [ -d openwrt/bin/targets/qualcommax/ipq60xx ]; then
            find openwrt/bin/targets/qualcommax/ipq60xx -maxdepth 1 -type f \
              \( -name '*jdcloud_re-cs-02*' -o -name '*.manifest' -o -name 'sha256sums' -o -name '*.buildinfo' \) \
              -exec cp -f {} output/ \;
          fi

          # ECM 只作为可选 IPK，不默认安装。
          find openwrt/bin -type f -name 'kmod-qca-nss-ecm*.ipk' \
            -exec cp -f {} output/ \; 2>/dev/null || true

          {
            echo "source=$SOURCE_REPO"
            echo "commit=$SOURCE_COMMIT"
            echo "lan_ip=$LAN_IP"
            echo "backend=daed"
            echo "dashboard_port=2023"
            echo "generated=$(date -Iseconds)"
          } > output/BUILD_INFO.txt

          ls -lh output

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Athena-AX6600-DAED-${{ env.SOURCE_COMMIT }}
          path: output/
          if-no-files-found: error
          retention-days: 14
